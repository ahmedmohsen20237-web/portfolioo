<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متابعة انجاز | AHMED MOHSEN</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f4f6fb; --bg2:#eaecf4; --card:#ffffff; --nav-bg:#ffffff;
  --border:#d8dce8; --text:#1a1c2e; --muted:#6b7280;
  --accent:#1abc9c; --accent2:#16a085;
  --empty:#ffffff; --empty-border:#c5c9d8;
  --f1:#1abc9c; --f2:#e74c3c; --f3:#9b59b6; --f4:#f39c12;
  --f5:#2980b9; --f6:#e67e22; --f7:#1dd1a1; --f8:#fd79a8;
  --f9:#6c5ce7; --f10:#00b894; --f11:#fdcb6e; --f12:#a29bfe;
  --t:0.45s cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"] {
  --bg:#0c0e15; --bg2:#12141d; --card:#181b26; --nav-bg:#13151f;
  --border:#252836; --text:#e2e5f0; --muted:#7a8099;
  --empty:#1a1d2a; --empty-border:#2e3245;
  --f1:#0d9e82; --f2:#c0392b; --f3:#8e44ad; --f4:#d68910;
  --f5:#1b6b9e; --f6:#ca6f1e; --f7:#17a589; --f8:#e91e8c;
  --f9:#5f27cd; --f10:#00897b; --f11:#f9a825; --f12:#7c4dff;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Cairo',sans-serif;
  background:var(--bg); color:var(--text);
  transition:background var(--t),color var(--t);
  min-height:100vh; display:flex; flex-direction:column;
}

/* ══ NAV ══ */
nav {
  background:var(--nav-bg); border-bottom:1px solid var(--border);
  padding:0 1.2rem; height:56px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:200;
  transition:background var(--t),border-color var(--t); gap:.8rem;
}
.nav-logo { display:flex; align-items:center; gap:8px; font-size:1.1rem; font-weight:900; color:var(--text); text-decoration:none; white-space:nowrap; }
.logo-dot { width:30px; height:30px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.9rem; box-shadow:0 0 12px rgba(26,188,156,.4); }
.nav-center { display:flex; gap:4px; overflow-x:auto; max-width:55vw; }
.nav-center::-webkit-scrollbar { height:3px; }
.nav-center::-webkit-scrollbar-thumb { background:var(--accent); border-radius:9px; }
.nav-tab { padding:5px 13px; border-radius:8px; border:none; background:none; font-family:'Cairo',sans-serif; font-size:.8rem; font-weight:600; color:var(--muted); cursor:pointer; transition:background .2s,color .2s; white-space:nowrap; }
.nav-tab:hover { background:var(--bg2); color:var(--text); }
.nav-tab.active { background:var(--accent); color:#fff; }
.nav-actions { display:flex; align-items:center; gap:7px; flex-shrink:0; }
.btn { padding:6px 13px; border-radius:20px; border:1px solid var(--border); background:var(--bg2); font-family:'Cairo',sans-serif; font-size:.78rem; font-weight:600; color:var(--muted); cursor:pointer; transition:all .2s; white-space:nowrap; }
.btn:hover { border-color:var(--accent); color:var(--accent); }
.btn-accent { background:var(--accent); border-color:var(--accent); color:#fff!important; }
.btn-accent:hover { background:var(--accent2); border-color:var(--accent2); }

/* ══ PAGES ══ */
.page { display:none; flex:1; flex-direction:column; }
.page.active { display:flex; }

/* Page transition animations */
@keyframes slideInRight { from { opacity:0; transform:translateX(30px); } to { opacity:1; transform:translateX(0); } }
@keyframes slideInLeft  { from { opacity:0; transform:translateX(-30px); } to { opacity:1; transform:translateX(0); } }
@keyframes fadeInUp     { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes popIn        { from { opacity:0; transform:scale(.92); } to { opacity:1; transform:scale(1); } }
@keyframes fadeIn       { to { opacity:1; } }

.page.active.anim-right { animation:slideInRight .35s ease; }
.page.active.anim-left  { animation:slideInLeft .35s ease; }

/* ══ HOME ══ */
.home-wrap { padding:1.5rem; max-width:960px; margin:0 auto; width:100%; animation:fadeInUp .4s ease; }
.home-wrap h2 { font-size:1.05rem; font-weight:700; margin-bottom:1rem; }
.page-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; }
.page-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:1.1rem; cursor:pointer; transition:border-color .2s,transform .15s,box-shadow .2s; animation:popIn .3s ease; }
.page-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 8px 24px rgba(26,188,156,.12); }
.pc-title { font-size:.95rem; font-weight:700; margin-bottom:4px; }
.pc-sub { font-size:.75rem; color:var(--muted); margin-bottom:9px; }
.pbar-wrap { background:var(--bg2); border-radius:999px; height:7px; overflow:hidden; }
.pbar-fill { height:100%; border-radius:999px; background:linear-gradient(90deg,var(--accent),#9b59b6); transition:width .5s; }
.pbar-label { font-size:.72rem; color:var(--muted); margin-top:4px; text-align:left; }
.add-card { background:var(--card); border:2px dashed var(--border); border-radius:14px; padding:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; color:var(--muted); font-size:.85rem; font-weight:600; transition:border-color .2s,color .2s; min-height:106px; animation:popIn .3s ease; }
.add-card:hover { border-color:var(--accent); color:var(--accent); }

/* ══ GRID PAGE ══ */
.grid-header { padding:.9rem 1.4rem .4rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
.grid-title { font-size:1rem; font-weight:700; }
.grid-meta { font-size:.77rem; color:var(--muted); margin-top:2px; }
.grid-controls { display:flex; gap:7px; align-items:center; flex-wrap:wrap; }
.progress-strip { margin:0 1.4rem .4rem; background:var(--bg2); border-radius:999px; height:5px; overflow:hidden; }
.ps-fill { height:100%; border-radius:999px; background:linear-gradient(90deg,var(--accent),#9b59b6); transition:width .5s; }
.grid-wrapper { flex:1; padding:.4rem 1.4rem 1.4rem; overflow-y:auto; }
.circle-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(44px,1fr)); gap:7px; max-width:1400px; }

/* ══ SHAPES ══ */
.shape-item {
  aspect-ratio:1; cursor:pointer;
  background:var(--empty); border:2px solid var(--empty-border);
  transition:transform .18s, box-shadow .25s, background .25s, border-color .25s, border-radius .3s;
  position:relative; overflow:hidden;
}
.shape-item:hover { transform:scale(1.12); z-index:2; }
.shape-item.filled { border-color:transparent; }

/* shape types */
.shape-circle   { border-radius:50%; }
.shape-square   { border-radius:6px; }
.shape-star     { clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%); border-radius:0; border:none; }

/* fill colors – 12 variants */
.shape-item.f1  { background:var(--f1)!important; }
.shape-item.f2  { background:var(--f2)!important; }
.shape-item.f3  { background:var(--f3)!important; }
.shape-item.f4  { background:var(--f4)!important; }
.shape-item.f5  { background:var(--f5)!important; }
.shape-item.f6  { background:var(--f6)!important; }
.shape-item.f7  { background:var(--f7)!important; }
.shape-item.f8  { background:var(--f8)!important; }
.shape-item.f9  { background:var(--f9)!important; }
.shape-item.f10 { background:var(--f10)!important; }
.shape-item.f11 { background:var(--f11)!important; }
.shape-item.f12 { background:var(--f12)!important; }

/* ══ NUMBERING ══ */
.shape-item .num-label {
  position:absolute; inset:0;
  display:none; align-items:center; justify-content:center;
  font-family:'Cairo',sans-serif; font-weight:700;
  pointer-events:none; line-height:1;
  z-index:3;
}
.show-nums .shape-item .num-label { display:flex; }

/* font size scales with shape size — set via JS */
.shape-item .num-label { font-size:clamp(7px,1.6vw,13px); }

/* unfilled: dark text; filled: white text */
.shape-item .num-label { color: #555; }
.shape-item.filled .num-label { color: rgba(255,255,255,.92); text-shadow:0 1px 3px rgba(0,0,0,.35); }
[data-theme="dark"] .shape-item .num-label { color: #888; }

/* btn-num active state */
.btn-num-on { background:var(--accent)!important; border-color:var(--accent)!important; color:#fff!important; }

.shape-item.glow { animation:gp 2s infinite; }
@keyframes gp {
  0%,100% { box-shadow:0 0 0 3px rgba(0,210,255,.7),0 0 18px rgba(0,210,255,.5),0 0 38px rgba(0,210,255,.28); }
  50%      { box-shadow:0 0 0 5px rgba(0,210,255,.9),0 0 32px rgba(0,210,255,.7),0 0 60px rgba(0,210,255,.4); }
}
@keyframes gpD {
  0%,100% { box-shadow:0 0 0 3px rgba(0,210,255,.7),0 0 18px rgba(0,210,255,.5); }
  50%      { box-shadow:0 0 0 5px rgba(0,210,255,.9),0 0 32px rgba(0,210,255,.7); }
}

/* click pop animation */
@keyframes clickPop {
  0%   { transform:scale(1); }
  40%  { transform:scale(1.25); }
  100% { transform:scale(1); }
}
.shape-circle.pop   { animation:clickPop .3s ease; }
.shape-square.pop   { animation:clickPop .3s ease; }
.shape-rounded.pop  { animation:clickPop .3s ease; }
.shape-diamond.pop  { animation:clickPop .3s ease forwards; transform-origin:center; }
.shape-hexagon.pop  { animation:clickPop .3s ease; }
.shape-star.pop     { animation:clickPop .3s ease; }

/* ══ SHAPE SELECTOR ══ */
.shape-sel { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.shape-sel-label { font-size:.75rem; color:var(--muted); }
.shape-btn {
  width:26px; height:26px; cursor:pointer; background:var(--bg2);
  border:2px solid var(--border); display:flex; align-items:center; justify-content:center;
  font-size:.7rem; transition:border-color .2s, background .2s; flex-shrink:0;
}
.shape-btn:hover, .shape-btn.sel { border-color:var(--accent); background:rgba(26,188,156,.15); }
.shape-btn-circle  { border-radius:50%; }
.shape-btn-square  { border-radius:4px; }
.shape-btn-star    { border-radius:0; clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%); }

/* ══ EXTENDED COLOR PICKER ══ */
.cpick { display:flex; align-items:center; gap:4px; flex-wrap:wrap; }
.cpick-label { font-size:.75rem; color:var(--muted); }
.sw { width:18px; height:18px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform .15s,border-color .15s; flex-shrink:0; }
.sw:hover,.sw.sel { transform:scale(1.35); border-color:var(--text); }
.sw1{background:var(--f1);} .sw2{background:var(--f2);} .sw3{background:var(--f3);}
.sw4{background:var(--f4);} .sw5{background:var(--f5);} .sw6{background:var(--f6);}
.sw7{background:var(--f7);} .sw8{background:var(--f8);} .sw9{background:var(--f9);}
.sw10{background:var(--f10);} .sw11{background:var(--f11);} .sw12{background:var(--f12);}

/* ══ MODAL ══ */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); backdrop-filter:blur(5px); z-index:500; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; animation:fadeInUp .25s ease; }
.modal { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:1.8rem; width:min(420px,92vw); display:flex; flex-direction:column; gap:14px; }
.modal h3 { font-size:1rem; font-weight:700; }
.modal label { font-size:.8rem; color:var(--muted); display:block; margin-bottom:4px; }
.modal input, .modal select { width:100%; padding:9px 13px; border-radius:9px; border:1px solid var(--border); background:var(--bg2); font-family:'Cairo',sans-serif; font-size:.88rem; color:var(--text); outline:none; transition:border-color .2s; }
.modal input:focus, .modal select:focus { border-color:var(--accent); }
.modal-row { display:flex; gap:8px; justify-content:flex-end; }

/* ══ PALETTE MODAL ══ */
.palette-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:10px; }
.pal-swatch { width:100%; aspect-ratio:1; border-radius:50%; cursor:pointer; border:3px solid transparent; transition:transform .15s, border-color .15s; }
.pal-swatch:hover, .pal-swatch.sel { transform:scale(1.2); border-color:var(--text); }

/* ══ TOAST ══ */
.toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(60px); background:var(--card); border:1px solid var(--border); border-radius:10px; padding:9px 18px; font-size:.82rem; font-weight:600; box-shadow:0 8px 28px rgba(0,0,0,.2); z-index:600; transition:transform .3s,opacity .3s; opacity:0; pointer-events:none; }
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

/* ══ FOOTER ══ */
footer { background:var(--nav-bg); border-top:1px solid var(--border); padding:.65rem 1.4rem; display:flex; align-items:center; justify-content:center; font-size:.73rem; color:var(--muted); transition:background var(--t),border-color var(--t); }

/* ══ SAVE PANEL ══ */
.save-panel { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:1.2rem; margin:0 1.4rem .8rem; display:flex; align-items:center; gap:12px; flex-wrap:wrap; animation:fadeInUp .3s ease; }
.save-info { flex:1; font-size:.8rem; color:var(--muted); }
.save-info strong { color:var(--text); }
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo" onclick="showHome();return false;">
    <span class="logo-dot">🎯</span>
    <span>متابعة انجاز</span>
  </a>
  <div class="nav-center" id="navTabs"></div>
  <div class="nav-actions">
    <button class="btn btn-accent" onclick="openNewPageModal()">+ صفحة</button>
    <button class="btn" id="themeBtn" onclick="toggleTheme()">☀️</button>
  </div>
</nav>

<!-- HOME -->
<div class="page active" id="homePage">
  <div class="home-wrap">
    <h2>📋 صفحاتك</h2>
    <div class="page-cards" id="pageCards"></div>
  </div>
</div>

<!-- GRID -->
<div class="page" id="gridPage">
  <div class="grid-header">
    <div>
      <div class="grid-title" id="gridTitle">—</div>
      <div class="grid-meta" id="gridMeta">—</div>
    </div>
    <div class="grid-controls">
      <!-- Shape selector -->
      <div class="shape-sel" id="shapeSel">
        <span class="shape-sel-label">الشكل:</span>
        <div class="shape-btn shape-btn-circle sel" data-shape="circle" title="دائرة"></div>
        <div class="shape-btn shape-btn-square" data-shape="square" title="مربع"></div>
        <div class="shape-btn shape-btn-star" data-shape="star" title="نجمة"></div>
      </div>
      <!-- Color picker -->
      <div class="cpick" id="cpick">
        <span class="cpick-label">اللون:</span>
        <div class="sw sw1 sel"  data-c="1"></div>
        <div class="sw sw2"  data-c="2"></div>
        <div class="sw sw3"  data-c="3"></div>
        <div class="sw sw4"  data-c="4"></div>
        <div class="sw sw5"  data-c="5"></div>
        <div class="sw sw6"  data-c="6"></div>
        <div class="sw sw7"  data-c="7"></div>
        <div class="sw sw8"  data-c="8"></div>
        <div class="sw sw9"  data-c="9"></div>
        <div class="sw sw10" data-c="10"></div>
        <div class="sw sw11" data-c="11"></div>
        <div class="sw sw12" data-c="12"></div>
      </div>
      <button class="btn" onclick="openAddCircles()">+ عناصر</button>
      <button class="btn" id="numBtn" onclick="toggleNums()" title="تفعيل/إيقاف الترقيم">١٢٣ ترقيم</button>
      <button class="btn" onclick="resetPage()">تصفير</button>
      <button class="btn" onclick="deletePage()">🗑️</button>
      <button class="btn" onclick="goBack()">← رجوع</button>
    </div>
  </div>
  <div class="progress-strip"><div class="ps-fill" id="psFill"></div></div>
  <div class="grid-wrapper">
    <div class="circle-grid" id="circleGrid"></div>
  </div>
</div>

<footer>
  <div style="text-align:center;line-height:1.7;">
    <div>© 2026 AHMED MOHSEN — جميع الحقوق محفوظة</div>
    <div style="font-size:.7rem;margin-top:3px;color:var(--muted);opacity:.8;">الموقع غير ربحي هدفه مساعدة الجميع على تحديد أهدافهم ومتابعتها</div>
  </div>
</footer>

<!-- ADD ELEMENTS MODAL -->
<div class="modal-overlay" id="modalAdd">
  <div class="modal">
    <h3>➕ إضافة عناصر</h3>
    <div><label>عدد العناصر</label><input type="number" id="addN" value="10" min="1" max="9999"></div>
    <div class="modal-row">
      <button class="btn" onclick="closeModal('modalAdd')">إلغاء</button>
      <button class="btn btn-accent" onclick="confirmAdd()">إضافة</button>
    </div>
  </div>
</div>

<!-- NEW PAGE MODAL -->
<div class="modal-overlay" id="modalNew">
  <div class="modal">
    <h3>📄 صفحة جديدة</h3>
    <div><label>اسم الصفحة</label><input type="text" id="newName" placeholder="مثال: اختبار لفظي" maxlength="40"></div>
    <div><label>عدد العناصر الابتدائي</label><input type="number" id="newCount" value="100" min="1" max="9999"></div>
    <div><label>شكل العناصر</label>
      <select id="newShape">
        <option value="circle">⬤ دائرة</option>
        <option value="square">■ مربع</option>
        <option value="star">★ نجمة</option>
      </select>
    </div>
    <div class="modal-row">
      <button class="btn" onclick="closeModal('modalNew')">إلغاء</button>
      <button class="btn btn-accent" onclick="confirmNewPage()">إنشاء</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══ STATE ══
const STORE_KEY = 'ahmed_mohsen_v1';

let pages = (() => {
  try {
    const r = localStorage.getItem(STORE_KEY);
    if (r) return JSON.parse(r);
  } catch(e) {}
  return [{ id:'p1', name:'الصفحة الأولى', circles:Array(100).fill(0), shape:'circle' }];
})();

let curId      = null;
let selColor   = 1;
let selShape   = 'circle';
let dark       = true;
let showNums   = false;

// ══ NUMBERING TOGGLE ══
function toggleNums() {
  showNums = !showNums;
  const grid = document.getElementById('circleGrid');
  const btn  = document.getElementById('numBtn');
  if (showNums) {
    grid.classList.add('show-nums');
    btn.classList.add('btn-num-on');
    btn.textContent = '١٢٣ إخفاء';
  } else {
    grid.classList.remove('show-nums');
    btn.classList.remove('btn-num-on');
    btn.textContent = '١٢٣ ترقيم';
  }
}

// ══ SAVE TO LOCALSTORAGE ══
function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(pages)); } catch(e) {}
}

// ══ THEME ══
function applyTheme() {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : '');
  document.getElementById('themeBtn').textContent = dark ? '☀️' : '🌙';
}
function toggleTheme() {
  dark = !dark;
  applyTheme();
}
applyTheme();

// ══ NAV TABS ══
function renderTabs() {
  const c = document.getElementById('navTabs');
  c.innerHTML = '';
  const h = document.createElement('button');
  h.className = 'nav-tab' + (curId === null ? ' active' : '');
  h.textContent = '🏠';
  h.onclick = showHome;
  c.appendChild(h);
  pages.forEach(p => {
    const b = document.createElement('button');
    b.className = 'nav-tab' + (curId === p.id ? ' active' : '');
    b.textContent = p.name;
    b.onclick = () => openPage(p.id);
    c.appendChild(b);
  });
}

// ══ HOME ══
function showHome(animate) {
  curId = null;
  const hp = document.getElementById('homePage');
  const gp = document.getElementById('gridPage');
  hp.classList.add('active');
  gp.classList.remove('active', 'anim-right', 'anim-left');
  hp.classList.remove('anim-right','anim-left');
  if (animate !== false) { hp.classList.add('anim-left'); setTimeout(()=>hp.classList.remove('anim-left'),400); }
  renderTabs();
  renderCards();
}

function renderCards() {
  const c = document.getElementById('pageCards');
  c.innerHTML = '';
  pages.forEach((p, idx) => {
    const filled = p.circles.filter(v => v > 0).length;
    const total  = p.circles.length;
    const pct    = total > 0 ? Math.round(filled / total * 100) : 0;
    const d = document.createElement('div');
    d.className = 'page-card';
    d.style.animationDelay = idx * 60 + 'ms';
    const shapeLabel = { circle:'دائرة', square:'مربع', star:'نجمة' }[p.shape||'circle'] || 'دائرة';
    d.innerHTML = `
      <div class="pc-title">${p.name}</div>
      <div class="pc-sub">${filled} / ${total} ${shapeLabel} • ${pct}% مكتمل</div>
      <div class="pbar-wrap"><div class="pbar-fill" style="width:${pct}%"></div></div>
      <div class="pbar-label">${pct}%</div>
    `;
    d.onclick = () => openPage(p.id);
    c.appendChild(d);
  });
  const a = document.createElement('div');
  a.className = 'add-card';
  a.innerHTML = '<span style="font-size:1.4rem">+</span><span>صفحة جديدة</span>';
  a.onclick = openNewPageModal;
  c.appendChild(a);
}

// ══ GRID ══
function openPage(id) {
  curId = id;
  const hp = document.getElementById('homePage');
  const gp = document.getElementById('gridPage');
  hp.classList.remove('active');
  gp.classList.add('active');
  gp.classList.remove('anim-right','anim-left');
  void gp.offsetWidth; // force reflow
  gp.classList.add('anim-right');
  setTimeout(() => gp.classList.remove('anim-right'), 400);
  renderTabs();

  // sync shape selector to page's shape
  const page = pages.find(p => p.id === id);
  if (page) {
    selShape = page.shape || 'circle';
    document.querySelectorAll('.shape-btn').forEach(b => b.classList.toggle('sel', b.dataset.shape === selShape));
  }
  renderGrid();
}

function goBack() {
  showHome(true);
}

function renderGrid() {
  const page = pages.find(p => p.id === curId);
  if (!page) return;
  document.getElementById('gridTitle').textContent = page.name;
  updateMeta(page);
  const grid = document.getElementById('circleGrid');
  grid.innerHTML = '';
  const shape = page.shape || 'circle';
  // restore numbering class
  if (showNums) grid.classList.add('show-nums');
  else grid.classList.remove('show-nums');

  page.circles.forEach((v, i) => {
    const el = document.createElement('div');
    el.className = `shape-item shape-${shape}`;
    if (v > 0) el.classList.add('filled', `f${v}`);
    el.style.opacity = '0';
    el.style.animation = `fadeIn .35s ${Math.min(i * 4, 800)}ms ease forwards`;

    // number label
    const lbl = document.createElement('span');
    lbl.className = 'num-label';
    lbl.textContent = i + 1;
    el.appendChild(lbl);

    el.onclick = () => toggleC(i, el);
    grid.appendChild(el);
  });
  updateProgress(page);
}

function toggleC(idx, el) {
  const page = pages.find(p => p.id === curId);
  if (!page) return;

  // pop animation
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
  setTimeout(() => el.classList.remove('pop'), 350);

  if (page.circles[idx] === 0) {
    page.circles[idx] = selColor;
    el.classList.add('filled', `f${selColor}`);
    el.classList.add('glow');
    setTimeout(() => el.classList.remove('glow'), 2000);
  } else {
    const old = page.circles[idx];
    page.circles[idx] = 0;
    el.classList.remove('filled');
    for (let i = 1; i <= 12; i++) el.classList.remove(`f${i}`);
  }
  save();
  updateMeta(page);
  updateProgress(page);
}

function updateMeta(page) {
  const f   = page.circles.filter(v => v > 0).length;
  const t   = page.circles.length;
  const pct = t > 0 ? Math.round(f / t * 100) : 0;
  document.getElementById('gridMeta').textContent = `${f} من ${t} • ${pct}% مكتمل`;
}

function updateProgress(page) {
  const f = page.circles.filter(v => v > 0).length;
  const t = page.circles.length;
  document.getElementById('psFill').style.width = (t > 0 ? f / t * 100 : 0) + '%';
  renderTabs();
}

// ══ ADD ELEMENTS ══
function openAddCircles() { document.getElementById('addN').value = 10; openModal('modalAdd'); }
function confirmAdd() {
  const n = parseInt(document.getElementById('addN').value) || 0;
  if (n < 1) return;
  const page = pages.find(p => p.id === curId);
  if (!page) return;
  for (let i = 0; i < n; i++) page.circles.push(0);
  save(); closeModal('modalAdd'); renderGrid();
  showToast(`✅ أضيفت ${n} عناصر`);
}

// ══ RESET ══
function resetPage() {
  if (!confirm('تصفير جميع العناصر؟')) return;
  const page = pages.find(p => p.id === curId);
  if (!page) return;
  page.circles = page.circles.map(() => 0);
  save(); renderGrid(); showToast('🔄 تم التصفير');
}

// ══ DELETE PAGE ══
function deletePage() {
  const page = pages.find(p => p.id === curId);
  if (!page) return;
  if (!confirm(`حذف صفحة "${page.name}"؟`)) return;
  pages = pages.filter(p => p.id !== curId);
  save(); showHome(true); showToast('🗑️ تم الحذف');
}

// ══ NEW PAGE ══
function openNewPageModal() {
  document.getElementById('newName').value  = '';
  document.getElementById('newCount').value = 100;
  document.getElementById('newShape').value = 'circle';
  openModal('modalNew');
}
function confirmNewPage() {
  const name  = document.getElementById('newName').value.trim();
  const count = parseInt(document.getElementById('newCount').value) || 100;
  const shape = document.getElementById('newShape').value || 'circle';
  if (!name) { document.getElementById('newName').focus(); return; }
  const id = 'p' + Date.now();
  pages.push({ id, name, circles: Array(count).fill(0), shape });
  save(); closeModal('modalNew'); renderCards(); renderTabs(); openPage(id);
  showToast(`📄 "${name}" تم الإنشاء`);
}

// ══ SHAPE SELECTOR ══
document.getElementById('shapeSel').addEventListener('click', e => {
  const btn = e.target.closest('.shape-btn');
  if (!btn) return;
  document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  selShape = btn.dataset.shape;

  // update current page's shape & re-render with animation
  const page = pages.find(p => p.id === curId);
  if (page) {
    page.shape = selShape;
    save();
    // animate grid swap
    const grid = document.getElementById('circleGrid');
    grid.style.opacity = '0';
    grid.style.transform = 'scale(.96)';
    grid.style.transition = 'opacity .2s, transform .2s';
    setTimeout(() => {
      renderGrid();
      grid.style.opacity = '1';
      grid.style.transform = 'scale(1)';
      setTimeout(() => { grid.style.transition = ''; }, 300);
    }, 200);
  }
});

// ══ COLOR PICKER ══
document.getElementById('cpick').addEventListener('click', e => {
  const sw = e.target.closest('.sw');
  if (!sw) return;
  document.querySelectorAll('.sw').forEach(s => s.classList.remove('sel'));
  sw.classList.add('sel');
  selColor = parseInt(sw.dataset.c);

  // bounce the swatch
  sw.style.transform = 'scale(1.5)';
  setTimeout(() => { sw.style.transform = ''; }, 200);
});

// ══ MODALS ══
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

// ══ TOAST ══
let tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(tt); tt = setTimeout(() => t.classList.remove('show'), 2600);
}

// ══ BOOT ══
showHome(false);
</script>
</body>
</html>
