<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شبكة الدوائر | نور المعرفة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f4f6fb; --bg2:#eaecf4; --card:#ffffff; --nav-bg:#ffffff;
  --border:#d8dce8; --text:#1a1c2e; --muted:#6b7280;
  --accent:#1abc9c; --accent2:#16a085;
  --empty:#ffffff; --empty-border:#c5c9d8;
  --f1:#1abc9c; --f2:#16a085; --f3:#27ae60; --f4:#f39c12; --f5:#2980b9; --f6:#8bc34a;
  --t:0.45s cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"] {
  --bg:#0c0e15; --bg2:#12141d; --card:#181b26; --nav-bg:#13151f;
  --border:#252836; --text:#e2e5f0; --muted:#7a8099;
  --empty:#1a1d2a; --empty-border:#2e3245;
  --f1:#0d9e82; --f2:#0b7a64; --f3:#1a7a3c; --f4:#c07d0a; --f5:#1b6b9e; --f6:#5a8020;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);transition:background var(--t),color var(--t);min-height:100vh;display:flex;flex-direction:column;}

nav{background:var(--nav-bg);border-bottom:1px solid var(--border);padding:0 1.2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;transition:background var(--t),border-color var(--t);gap:.8rem;}
.nav-logo{display:flex;align-items:center;gap:8px;font-size:1.15rem;font-weight:900;color:var(--text);text-decoration:none;white-space:nowrap;}
.logo-dot{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;box-shadow:0 0 12px rgba(26,188,156,.4);}
.nav-center{display:flex;gap:4px;overflow-x:auto;max-width:55vw;}
.nav-center::-webkit-scrollbar{height:3px;}
.nav-center::-webkit-scrollbar-thumb{background:var(--accent);border-radius:9px;}
.nav-tab{padding:5px 13px;border-radius:8px;border:none;background:none;font-family:'Cairo',sans-serif;font-size:.8rem;font-weight:600;color:var(--muted);cursor:pointer;transition:background .2s,color .2s;white-space:nowrap;}
.nav-tab:hover{background:var(--bg2);color:var(--text);}
.nav-tab.active{background:var(--accent);color:#fff;}
.nav-actions{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.btn{padding:6px 13px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);font-family:'Cairo',sans-serif;font-size:.78rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#fff!important;}
.btn-accent:hover{background:var(--accent2);border-color:var(--accent2);}

.page{display:none;flex:1;flex-direction:column;}
.page.active{display:flex;}

/* HOME */
.home-wrap{padding:1.5rem;max-width:960px;margin:0 auto;width:100%;}
.home-wrap h2{font-size:1.05rem;font-weight:700;margin-bottom:1rem;}
.page-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.page-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.1rem;cursor:pointer;transition:border-color .2s,transform .15s,box-shadow .2s;}
.page-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,188,156,.1);}
.pc-title{font-size:.95rem;font-weight:700;margin-bottom:4px;}
.pc-sub{font-size:.75rem;color:var(--muted);margin-bottom:9px;}
.pbar-wrap{background:var(--bg2);border-radius:999px;height:7px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--f3));transition:width .5s;}
.pbar-label{font-size:.72rem;color:var(--muted);margin-top:4px;text-align:left;}
.add-card{background:var(--card);border:2px dashed var(--border);border-radius:14px;padding:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:.85rem;font-weight:600;transition:border-color .2s,color .2s;min-height:106px;}
.add-card:hover{border-color:var(--accent);color:var(--accent);}

/* GRID PAGE */
.grid-header{padding:.9rem 1.4rem .4rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.grid-title{font-size:1rem;font-weight:700;}
.grid-meta{font-size:.77rem;color:var(--muted);margin-top:2px;}
.grid-controls{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.progress-strip{margin:0 1.4rem .4rem;background:var(--bg2);border-radius:999px;height:5px;overflow:hidden;}
.ps-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--f3));transition:width .4s;}
.grid-wrapper{flex:1;padding:.4rem 1.4rem 1.4rem;overflow-y:auto;}
.circle-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(44px,1fr));gap:7px;max-width:1400px;}

.circle{aspect-ratio:1;border-radius:50%;cursor:pointer;border:2px solid var(--empty-border);background:var(--empty);transition:transform .18s,box-shadow .25s,background .25s,border-color .25s;}
.circle:hover{transform:scale(1.1);}
.circle.filled{border-color:transparent;}
.circle.f1{background:var(--f1);}
.circle.f2{background:var(--f2);}
.circle.f3{background:var(--f3);}
.circle.f4{background:var(--f4);}
.circle.f5{background:var(--f5);}
.circle.f6{background:var(--f6);}
.circle.glow{animation:gp 2s infinite;}
@keyframes gp{
  0%,100%{box-shadow:0 0 0 3px rgba(0,210,255,.7),0 0 18px rgba(0,210,255,.5),0 0 38px rgba(0,210,255,.28);}
  50%{box-shadow:0 0 0 5px rgba(0,210,255,.9),0 0 32px rgba(0,210,255,.7),0 0 60px rgba(0,210,255,.4);}
}

/* COLOR PICKER */
.cpick{display:flex;align-items:center;gap:5px;}
.cpick-label{font-size:.75rem;color:var(--muted);}
.sw{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;}
.sw:hover,.sw.sel{transform:scale(1.3);border-color:var(--text);}
.sw1{background:var(--f1);}.sw2{background:var(--f2);}.sw3{background:var(--f3);}
.sw4{background:var(--f4);}.sw5{background:var(--f5);}.sw6{background:var(--f6);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:500;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.8rem;width:min(400px,92vw);display:flex;flex-direction:column;gap:14px;}
.modal h3{font-size:1rem;font-weight:700;}
.modal label{font-size:.8rem;color:var(--muted);display:block;margin-bottom:4px;}
.modal input{width:100%;padding:9px 13px;border-radius:9px;border:1px solid var(--border);background:var(--bg2);font-family:'Cairo',sans-serif;font-size:.88rem;color:var(--text);outline:none;transition:border-color .2s;}
.modal input:focus{border-color:var(--accent);}
.modal-row{display:flex;gap:8px;justify-content:flex-end;}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 18px;font-size:.82rem;font-weight:600;box-shadow:0 8px 28px rgba(0,0,0,.15);z-index:600;transition:transform .3s,opacity .3s;opacity:0;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

footer{background:var(--nav-bg);border-top:1px solid var(--border);padding:.65rem 1.4rem;display:flex;align-items:center;justify-content:space-between;font-size:.73rem;color:var(--muted);transition:background var(--t),border-color var(--t);}
.fsoc{display:flex;gap:12px;}
.fsoc a{color:var(--muted);text-decoration:none;transition:color .2s;}
.fsoc a:hover{color:var(--accent);}
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo" onclick="showHome();return false;">
    <span class="logo-dot">🌐</span>
    <span>نور المعرفة</span>
  </a>
  <div class="nav-center" id="navTabs"></div>
  <div class="nav-actions">
    <button class="btn btn-accent" onclick="openNewPageModal()">+ صفحة</button>
    <button class="btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
  </div>
</nav>

<!-- HOME -->
<div class="page active" id="homePage">
  <div class="home-wrap">
    <h2>📋 صفحاتك</h2>
    <div class="page-cards" id="pageCards"></div>
  </div>
</div>

<!-- GRID -->
<div class="page" id="gridPage">
  <div class="grid-header">
    <div>
      <div class="grid-title" id="gridTitle">—</div>
      <div class="grid-meta" id="gridMeta">—</div>
    </div>
    <div class="grid-controls">
      <div class="cpick" id="cpick">
        <span class="cpick-label">اللون:</span>
        <div class="sw sw1 sel" data-c="1"></div>
        <div class="sw sw2" data-c="2"></div>
        <div class="sw sw3" data-c="3"></div>
        <div class="sw sw4" data-c="4"></div>
        <div class="sw sw5" data-c="5"></div>
        <div class="sw sw6" data-c="6"></div>
      </div>
      <button class="btn" onclick="openAddCircles()">+ دوائر</button>
      <button class="btn" onclick="resetPage()">تصفير</button>
      <button class="btn" onclick="deletePage()">🗑️</button>
      <button class="btn" onclick="showHome()">← رجوع</button>
    </div>
  </div>
  <div class="progress-strip"><div class="ps-fill" id="psFill"></div></div>
  <div class="grid-wrapper">
    <div class="circle-grid" id="circleGrid"></div>
  </div>
</div>

<footer>
  <span>© 2024 نور المعرفة — جميع الحقوق محفوظة</span>
  <div class="fsoc">
    <a href="#">f</a><a href="#">𝕏</a><a href="#">in</a><a href="#">▶</a>
  </div>
</footer>

<!-- ADD CIRCLES MODAL -->
<div class="modal-overlay" id="modalAdd">
  <div class="modal">
    <h3>➕ إضافة دوائر</h3>
    <div><label>عدد الدوائر</label><input type="number" id="addN" value="10" min="1" max="9999"></div>
    <div class="modal-row">
      <button class="btn" onclick="closeModal('modalAdd')">إلغاء</button>
      <button class="btn btn-accent" onclick="confirmAdd()">إضافة</button>
    </div>
  </div>
</div>

<!-- NEW PAGE MODAL -->
<div class="modal-overlay" id="modalNew">
  <div class="modal">
    <h3>📄 صفحة جديدة</h3>
    <div><label>اسم الصفحة</label><input type="text" id="newName" placeholder="مثال: سورة البقرة" maxlength="40"></div>
    <div><label>عدد الدوائر الابتدائي</label><input type="number" id="newCount" value="215" min="1" max="9999"></div>
    <div class="modal-row">
      <button class="btn" onclick="closeModal('modalNew')">إلغاء</button>
      <button class="btn btn-accent" onclick="confirmNewPage()">إنشاء</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let pages = (() => {
  try { const r = localStorage.getItem('noor_v2'); if(r) return JSON.parse(r); } catch(e){}
  return [{ id:'p1', name:'الصفحة الأولى', circles: Array(215).fill(0) }];
})();
let curId = null;
let selColor = 1;
let dark = false;

function save() {
  try { localStorage.setItem('noor_v2', JSON.stringify(pages)); } catch(e) {}
}

// ── THEME ──
function toggleTheme() {
  dark = !dark;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : '');
  document.getElementById('themeBtn').textContent = dark ? '☀️' : '🌙';
}

// ── NAV TABS ──
function renderTabs() {
  const c = document.getElementById('navTabs');
  c.innerHTML = '';
  const h = document.createElement('button');
  h.className = 'nav-tab' + (curId === null ? ' active' : '');
  h.textContent = '🏠';
  h.onclick = showHome;
  c.appendChild(h);
  pages.forEach(p => {
    const b = document.createElement('button');
    b.className = 'nav-tab' + (curId === p.id ? ' active' : '');
    b.textContent = p.name;
    b.onclick = () => openPage(p.id);
    c.appendChild(b);
  });
}

// ── HOME ──
function showHome() {
  curId = null;
  document.getElementById('homePage').classList.add('active');
  document.getElementById('gridPage').classList.remove('active');
  renderTabs();
  renderCards();
}

function renderCards() {
  const c = document.getElementById('pageCards');
  c.innerHTML = '';
  pages.forEach(p => {
    const filled = p.circles.filter(v => v > 0).length;
    const total = p.circles.length;
    const pct = total > 0 ? Math.round(filled/total*100) : 0;
    const d = document.createElement('div');
    d.className = 'page-card';
    d.innerHTML = `
      <div class="pc-title">${p.name}</div>
      <div class="pc-sub">${filled} / ${total} دائرة</div>
      <div class="pbar-wrap"><div class="pbar-fill" style="width:${pct}%"></div></div>
      <div class="pbar-label">${pct}% مكتمل</div>
    `;
    d.onclick = () => openPage(p.id);
    c.appendChild(d);
  });
  const a = document.createElement('div');
  a.className = 'add-card';
  a.innerHTML = '<span style="font-size:1.4rem">+</span><span>صفحة جديدة</span>';
  a.onclick = openNewPageModal;
  c.appendChild(a);
}

// ── GRID ──
function openPage(id) {
  curId = id;
  document.getElementById('homePage').classList.remove('active');
  document.getElementById('gridPage').classList.add('active');
  renderTabs();
  renderGrid();
}

function renderGrid() {
  const page = pages.find(p => p.id === curId);
  if (!page) return;
  document.getElementById('gridTitle').textContent = page.name;
  updateMeta(page);
  const grid = document.getElementById('circleGrid');
  grid.innerHTML = '';
  page.circles.forEach((v, i) => {
    const el = document.createElement('div');
    el.className = 'circle';
    if (v > 0) el.classList.add('filled', `f${v}`);
    el.style.opacity = 0;
    el.style.animation = `fadeIn .3s ${i*3}ms ease forwards`;
    el.onclick = () => toggleC(i, el);
    grid.appendChild(el);
  });
  updateProgress(page);
}

// inject fadeIn keyframe once
const ks = document.createElement('style');
ks.textContent = '@keyframes fadeIn{to{opacity:1}}';
document.head.appendChild(ks);

function toggleC(idx, el) {
  const page = pages.find(p => p.id === curId);
  if (!page) return;
  if (page.circles[idx] === 0) {
    page.circles[idx] = selColor;
    el.classList.add('filled', `f${selColor}`);
    el.classList.add('glow');
    setTimeout(() => el.classList.remove('glow'), 2200);
  } else {
    const old = page.circles[idx];
    page.circles[idx] = 0;
    el.classList.remove('filled', `f${old}`);
    for(let i=1;i<=6;i++) el.classList.remove(`f${i}`);
  }
  save();
  updateMeta(page);
  updateProgress(page);
  renderCards(); // keep home in sync
}

function updateMeta(page) {
  const f = page.circles.filter(v=>v>0).length;
  const t = page.circles.length;
  const pct = t>0?Math.round(f/t*100):0;
  document.getElementById('gridMeta').textContent = `${f} من ${t} • ${pct}% مكتمل`;
}

function updateProgress(page) {
  const f = page.circles.filter(v=>v>0).length;
  const t = page.circles.length;
  document.getElementById('psFill').style.width = (t>0?f/t*100:0)+'%';
  renderTabs();
}

// ── ADD CIRCLES ──
function openAddCircles() { document.getElementById('addN').value=10; openModal('modalAdd'); }
function confirmAdd() {
  const n = parseInt(document.getElementById('addN').value)||0;
  if (n<1) return;
  const page = pages.find(p=>p.id===curId);
  if (!page) return;
  for(let i=0;i<n;i++) page.circles.push(0);
  save(); closeModal('modalAdd'); renderGrid(); showToast(`✅ أضيفت ${n} دائرة`);
}

// ── RESET ──
function resetPage() {
  if(!confirm('تصفير جميع الدوائر؟')) return;
  const page = pages.find(p=>p.id===curId);
  if(!page) return;
  page.circles = page.circles.map(()=>0);
  save(); renderGrid(); showToast('🔄 تم التصفير');
}

// ── DELETE PAGE ──
function deletePage() {
  const page = pages.find(p=>p.id===curId);
  if(!page) return;
  if(!confirm(`حذف صفحة "${page.name}"؟`)) return;
  pages = pages.filter(p=>p.id!==curId);
  save(); showHome(); showToast('🗑️ تم الحذف');
}

// ── NEW PAGE ──
function openNewPageModal() { document.getElementById('newName').value=''; document.getElementById('newCount').value=215; openModal('modalNew'); }
function confirmNewPage() {
  const name = document.getElementById('newName').value.trim();
  const count = parseInt(document.getElementById('newCount').value)||215;
  if(!name){ document.getElementById('newName').focus(); return; }
  const id = 'p'+Date.now();
  pages.push({id, name, circles:Array(count).fill(0)});
  save(); closeModal('modalNew'); renderCards(); renderTabs(); openPage(id);
  showToast(`📄 "${name}" تم الإنشاء`);
}

// ── COLOR PICKER ──
document.getElementById('cpick').addEventListener('click', e => {
  const sw = e.target.closest('.sw');
  if(!sw) return;
  document.querySelectorAll('.sw').forEach(s=>s.classList.remove('sel'));
  sw.classList.add('sel');
  selColor = parseInt(sw.dataset.c);
});

// ── MODALS ──
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click', e=>{ if(e.target===o) o.classList.remove('open'); });
});

// ── TOAST ──
let tt;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(tt); tt=setTimeout(()=>t.classList.remove('show'),2500);
}

// ── BOOT ──
showHome();
</script>
</body>
</html>
